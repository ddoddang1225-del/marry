<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDodang Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pink: #FFF0F0;      /* 전체 배경 핑크 */
            --point-yellow: #FFF59D; /* 포스트잇 노란색 */
            --header-blue: #A9D1F7;  /* 로고 하늘색 */
            --menu-green: #DCEDC8;   /* 상단 메뉴 연두색 */
            --line-brown: #5D4037;   /* 구분선 진한 갈색 */
            --white: #FFFFFF;
        }

        body {
            background-color: var(--bg-pink);
            font-family: 'Gaegu', cursive;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* 1. 상단바: 전체를 가로지르는 가로선 포함 */
        header {
            width: 100%;
            height: 120px;
            display: flex;
            justify-content: flex-end; /* 로고와 메뉴를 우측으로 */
            align-items: center;
            padding: 0 50px;
            box-sizing: border-box;
            border-bottom: 4px solid var(--line-brown); /* 화면 끝까지 가는 가로선 */
            gap: 20px;
        }

        .logo {
            font-size: 3.5rem; color: var(--header-blue);
            font-weight: bold; text-shadow: 2px 2px #555;
            order: 2; /* 가장 오른쪽 */
        }

        .nav-group { display: flex; gap: 15px; order: 1; }
        .nav-item {
            width: 100px; height: 45px;
            background-color: var(--menu-green);
            border: 1px solid #999;
        }

        /* 2. 메인 컨텐츠 영역: 왼쪽 1/3과 오른쪽 2/3 분할 */
        .main-wrapper {
            display: flex;
            flex: 1;
            width: 100%;
        }

        /* 왼쪽 1/3 (결혼 정보 & 포스트잇) */
        .left-section {
            flex: 1; /* 전체의 1/3 */
            display: flex; flex-direction: column; align-items: center;
            padding-top: 40px;
            /* [중요] 오른쪽 세로선 */
            border-right: 4px solid var(--line-brown); 
        }

        .sidebar-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 30px; }

        .post-it {
            width: 200px; background-color: var(--point-yellow);
            padding: 25px 15px; border: 1px solid #ccc;
            margin-bottom: 30px; position: relative;
            box-shadow: 4px 4px 6px rgba(0,0,0,0.1);
        }
        /* 포스트잇 점 */
        .post-it::before, .post-it::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            background: #555; border-radius: 50%; top: 10px;
        }
        .post-it::before { left: 10px; } .post-it::after { right: 10px; }
        .post-it p { margin: 10px 0; font-size: 1.5rem; text-align: center; }

        /* 오른쪽 2/3 (사진 & 상세 정보) */
        .right-section {
            flex: 2; /* 전체의 2/3 */
            display: flex; flex-direction: column; align-items: center;
            padding: 40px;
        }

        .photo-box {
            width: 100%; max-width: 500px; height: 500px;
            background-color: #D9D9D9; border: 1px solid #999;
            margin-bottom: 30px; overflow: hidden;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        .details-box {
            background-color: var(--white);
            width: 100%; max-width: 600px;
            padding: 30px; border: 1px solid #ddd;
            text-align: center; font-size: 2rem; line-height: 1.8;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">DDodang</div>
        <div class="nav-group">
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
        </div>
    </header>

    <div class="main-wrapper">
        <aside class="left-section">
            <div class="sidebar-title">결혼</div>
            
            <div class="post-it">
                <p>신랑 : 이진현</p>
                <p style="font-size: 1.1rem; margin-top: 15px;">아버님, 어머님</p>
            </div>

            <div class="post-it">
                <p>신부 : 조윤담</p>
                <p style="font-size: 1.1rem; margin-top: 15px;">엄마, 아빠 장녀</p>
            </div>
        </aside>

        <main class="right-section">
            <div class="photo-box">
                <img src="images/danag.jpg" alt="메인 사진">
            </div>
            <div class="details-box">
                날짜 : 2027 . 10 . 09 (토요일)<br>
                시간 : 12시 (정오)<br>
                장소 : 롯데월드민속박물관
            </div>
        </main>
    </div>

</body>
</html>
