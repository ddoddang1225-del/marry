<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEDDING INVITE</title>
    
    <style>
        /* [폰트 설정] */
        @font-face {
            font-family: 'Cafe24Ssukssuk';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Ssukssuk.woff') format('woff');
        }
        @font-face {
            font-family: 'Ownglyph_Uiyeon';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_220508@1.0/Ownglyph_Uiyeon.woff') format('woff');
        }
        @font-face {
            font-family: 'Cafe24Decoline';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.1/Cafe24Decoline.woff2') format('woff2');
        }

        :root {
            --bg-pink: #FFF0F1; 
            --bg-blue-point: #C3D7F4; 
            --text-black: #1A1A1A;
            --menu-gray: #4A4A4A;
            --dropdown-bg: #2C2C2C; 
            --box-border: #E8E8E8; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-pink); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* [상단 헤더] */
        header.site-header {
            width: 100%;
            padding: 15px 40px 10px 40px; 
            background-color: var(--bg-pink);
            position: relative;
            z-index: 100; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* [PC 버전 상단 레이아웃] */
        .header-top {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: center; /* 기본은 중앙 */
            align-items: center; 
            position: relative; 
            margin-bottom: 15px; 
            min-height: 60px;   
        }

        /* 로고 (90% 유지) */
        .header-left-logo {
            position: absolute;
            left: 0;      
            top: 90%; 
            transform: translateY(-50%); 
        }
        .header-left-logo img {
            max-width: 120px; 
            height: auto;
            display: block;
        }

        /* PC용 큰 글씨 문구 */
        .header-title a {
            font-family: 'Cafe24Decoline', serif;
            font-size: 36px; /* PC에서 시원하게 크게! */
            color: var(--text-black);
            text-decoration: none;
            letter-spacing: 3px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* [PC용 오른쪽 정렬 네비게이션] */
        .nav-container {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: flex-end; /* 오른쪽으로 밀기 */
            gap: 12px; 
        }
        .nav-group { position: relative; flex: 0 1 150px; } /* 너비 적절히 고정 */

        .nav-item {
            font-family: 'Cafe24Ssukssuk', sans-serif;
            font-size: 15px;
            color: var(--menu-gray);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 38px;
            background-color: rgba(255, 255, 255, 0.6); 
            border: 1px solid var(--box-border);
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .nav-item:hover { background-color: #ffffff; border-color: #ccc; }

        /* [모바일 버전 유지] */
        @media (max-width: 768px) {
            header.site-header { padding: 15px 15px 10px 15px; }
            .header-top { min-height: auto; flex-direction: column; margin-bottom: 12px; }
            .header-left-logo { position: absolute; left: 10px; }
            .header-left-logo img { max-width: 70px; }
            
            /* 문구 조절 */
            .header-title a { font-size: 19px; letter-spacing: 0.5px; }
            
            /* 한 줄 배치 복구 */
            .nav-container { 
                justify-content: center;
                gap: 5px; 
            }
            .nav-group { flex: 1; max-width: none; }
            .nav-item { font-size: 11px; height: 28px; }
            
            .main-content { height: 550px; background-size: cover; }
        }

        /* 공통 스타일 */
        .dropdown-menu {
            display: none; position: absolute; top: 110%; left: 50%;
            transform: translateX(-50%); width: 100%; background-color: var(--dropdown-bg);
            padding: 5px 0; border-radius: 5px; z-index: 1000;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            display: block; padding: 8px; color: #ffffff; text-decoration: none;
            font-family: 'Cafe24Ssukssuk', sans-serif; font-size: 12px; text-align: center;
        }
        .main-content {
            position: relative; width: 100%; height: 750px; 
            display: flex; flex-direction: column; align-items: center;
            color: white; text-align: center; font-family: 'Ownglyph_Uiyeon', sans-serif;
            background-image: url('images/danag.jpg'); background-size: contain; 
            background-position: center; background-repeat: no-repeat;
            background-color: var(--bg-blue-point); 
        }
        .info-wrap { margin-top: 60px; }
        .info-date { font-size: 32px; margin-bottom: 10px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .info-time { font-size: 28px; margin-bottom: 30px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .info-location { font-size: 30px; line-height: 1.6; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-top">
            <div class="header-left-logo">
                <img src="images/또댕 로고.png" alt="또댕 로고">
            </div>
            <div class="header-title">
                <a href="/">Together, as always meant to be</a>
            </div>
        </div>
        
        <nav class="nav-container">
            <div class="nav-group">
                <div class="nav-item" onclick="toggleDropdown(event, 'info-drop')">결혼식 안내</div>
                <div id="info-drop" class="dropdown-menu">
                    <a href="#" class="dropdown-item">결혼식 안내</a>
                    <a href="#" class="dropdown-item">또댕이들이 걸어온 길</a>
                </div>
            </div>
            <div class="nav-group"><div class="nav-item">예약 및 문의</div></div>
            <div class="nav-group"><div class="nav-item">지도</div></div>
            <div class="nav-group"><div class="nav-item">GALLERY</div></div>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-wrap">
            <div class="info-date">날짜 : 2027. 10. 09. 토요일</div>
            <div class="info-time">시간 : PM 12:00</div>
            <div class="info-location">장소 : 롯데월드 민속박물관<br>전통혼례장</div>
        </div>
    </main>

    <script>
        function toggleDropdown(event, dropId) {
            event.stopPropagation();
            const dropdown = document.getElementById(dropId);
            const allDrops = document.getElementsByClassName("dropdown-menu");
            for(let d of allDrops) { if(d.id !== dropId) d.classList.remove('show'); }
            dropdown.classList.toggle('show');
        }
        window.onclick = function(event) {
            if (!event.target.closest('.nav-group')) {
                const dropdowns = document.getElementsByClassName("dropdown-menu");
                for (let i = 0; i < dropdowns.length; i++) { dropdowns[i].classList.remove('show'); }
            }
        }
    </script>
</body>
</html>
