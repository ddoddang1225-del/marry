<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEDDING INVITE</title>
    
    <style>
        /* [폰트 설정] */
        @font-face {
            font-family: 'Cafe24Ssukssuk';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Ssukssuk.woff') format('woff');
        }
        @font-face {
            font-family: 'Ownglyph_Uiyeon';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_220508@1.0/Ownglyph_Uiyeon.woff') format('woff');
        }
        @font-face {
            font-family: 'Cafe24Decoline';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.1/Cafe24Decoline.woff2') format('woff2');
        }

        :root {
            --bg-pink: #FFF0F1; 
            --bg-blue-point: #C3D7F4; 
            --text-black: #1A1A1A;
            --menu-gray: #4A4A4A;
            --dropdown-bg: #2C2C2C; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-pink); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* [상단 헤더 - 높이 10px 확장 수정] */
        header.site-header {
            width: 100%;
            /* [수정] 패딩을 늘려서 박스 크기를 약 10px 정도 더 키웠어! */
            padding: 20px 20px 15px 20px; 
            background-color: var(--bg-pink);
            position: relative;
            z-index: 100; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-top {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: center; 
            align-items: center; 
            position: relative; 
            margin-bottom: 12px; /* 네비게이션과의 간격도 살짝 여유 있게 */
            min-height: 50px;   
        }

        /* [또댕 로고] */
        .header-left-logo {
            position: absolute;
            left: 20px;      
            top: 50%;        
            transform: translateY(-50%); 
        }
        .header-left-logo img {
            max-width: 150px; 
            height: auto;
            display: block;
        }

        /* [영문 문구] */
        .header-title a {
            font-family: 'Cafe24Decoline', serif;
            font-size: 32px;
            color: var(--text-black);
            text-decoration: none;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* [네비게이션 & 드롭다운] */
        .nav-container {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 60px; 
        }
        .nav-group { position: relative; }
        .nav-item {
            font-family: 'Cafe24Ssukssuk', sans-serif;
            font-size: 17px;
            color: var(--menu-gray);
            cursor: pointer;
            padding-bottom: 3px;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            background-color: var(--dropdown-bg);
            padding: 10px 0;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-item {
            display: block;
            padding: 10px 20px;
            color: #ffffff;
            text-decoration: none;
            font-family: 'Cafe24Ssukssuk', sans-serif;
            font-size: 14px;
            text-align: center;
        }
        .dropdown-item:hover { background-color: #444; }

        /* [메인 콘텐츠] */
        .main-content {
            position: relative;
            width: 100%;
            height: 700px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
            font-family: 'Ownglyph_Uiyeon', sans-serif;
            background-image: url('images/danag.jpg'); 
            background-size: contain; 
            background-position: center;  
            background-repeat: no-repeat;
            background-color: var(--bg-blue-point); 
        }

        .info-wrap { margin-top: 60px; }
        .info-date { font-size: 30px; margin-bottom: 10px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .info-time { font-size: 26px; margin-bottom: 30px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .info-location { font-size: 28px; line-height: 1.6; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }

        /* [모바일] */
        @media (max-width: 768px) {
            header.site-header { padding: 15px 15px 10px 15px; }
            .header-top { flex-direction: column; position: static; min-height: auto; }
            .header-left-logo { position: static; transform: none; margin-bottom: 8px; }
            .header-left-logo img { max-width: 80px; margin: 0 auto; } 
            .header-title a { font-size: 20px; letter-spacing: 2px; }
            .nav-container { gap: 15px; } 
            .nav-item { font-size: 14px; }
            .main-content { height: 500px; background-size: cover; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-top">
            <div class="header-left-logo">
                <img src="images/또댕 로고.png" alt="또댕 로고">
            </div>
            <div class="header-title">
                <a href="/">THE ART OF US</a>
            </div>
        </div>
        
        <nav class="nav-container">
            <div class="nav-group">
                <div class="nav-item" onclick="toggleDropdown(event, 'info-drop')">결혼식 안내</div>
                <div id="info-drop" class="dropdown-menu">
                    <a href="#" class="dropdown-item">결혼식 안내</a>
                    <a href="#" class="dropdown-item">또댕이들이 걸어온 길</a>
                </div>
            </div>
            <div class="nav-item">예약 및 문의</div>
            <div class="nav-item">지도</div>
            <div class="nav-item">GALLERY</div>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-wrap">
            <div class="info-date">날짜 : 2027. 10. 09. 토요일</div>
            <div class="info-time">시간 : PM 12:00</div>
            <div class="info-location">
                장소 : 롯데월드 민속박물관<br>전통혼례장
            </div>
        </div>
    </main>

    <script>
        function toggleDropdown(event, dropId) {
            event.stopPropagation();
            const dropdown = document.getElementById(dropId);
            const allDrops = document.getElementsByClassName("dropdown-menu");
            for(let d of allDrops) {
                if(d.id !== dropId) d.classList.remove('show');
            }
            dropdown.classList.toggle('show');
        }
        window.onclick = function(event) {
            if (!event.target.matches('.nav-item')) {
                const dropdowns = document.getElementsByClassName("dropdown-menu");
                for (let i = 0; i < dropdowns.length; i++) {
                    dropdowns[i].classList.remove('show');
                }
            }
        }
    </script>
</body>
</html>
