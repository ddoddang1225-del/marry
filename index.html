<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            /* 공주가 가져온 네이버 코어 변수들 */
            --n-green: #03C75A; /* core-color-light-green-700 */
            --n-border: #E9EAEB; /* core-color-widget-gray */
            --n-bg: #FFFFFF;
            --n-text: #1C1C1C;
            --easing-standard: cubic-bezier(0.15, 0, 0.15, 1);
            --duration-acc: 300ms;
        }

        body { margin: 0; background-color: #F8F9FA; font-family: sans-serif; }

        /* [NAVER Style Header] */
        .naver-header {
            width: 100%;
            background-color: var(--n-bg);
            border-bottom: 1px solid var(--n-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-inner {
            max-width: 1280px; /* 네이버 PC 기준 폭 */
            margin: 0 auto;
            height: 120px; /* 검색창 영역 포함 높이 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 20px;
        }

        /* 상단 로고 & 검색창 라인 */
        .top-line {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .n-logo {
            font-size: 30px;
            font-weight: 900;
            color: var(--n-green);
            text-decoration: none;
            letter-spacing: -1px;
        }

        .search-area {
            flex: 1;
            max-width: 580px;
            height: 52px;
            border: 2px solid var(--n-green);
            border-radius: 2px;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }

        .search-input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
        }

        /* 서비스 메뉴 라인 (메일, 카페, 블로그 등) */
        .menu-line {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }

        .menu-item {
            font-size: 15px;
            font-weight: bold;
            color: var(--n-text);
            text-decoration: none;
            transition: color var(--duration-acc) var(--easing-standard);
        }

        .menu-item:hover {
            color: var(--n-green);
        }

        /* 반응형: 830px(태블릿/모바일) 기준 */
        @media (max-width: 830px) {
            .header-inner { height: auto; padding: 15px; }
            .top-line { flex-direction: column; gap: 15px; align-items: flex-start; }
            .search-area { max-width: 100%; height: 45px; }
            .menu-line { overflow-x: auto; white-space: nowrap; padding-bottom: 5px; }
        }
    </style>
</head>
<body>

<header class="naver-header">
    <div class="header-inner">
        <div class="top-line">
            <a href="#" class="n-logo">DDODANG</a>
            <div class="search-area">
                <input type="text" class="search-input" placeholder="우리 결혼 소식을 검색해보세요!">
            </div>
        </div>

        <nav class="menu-line">
            <a href="#" class="menu-item">결혼일자</a>
            <a href="#" class="menu-item">오시는길</a>
            <a href="#" class="menu-item">갤러리</a>
            <a href="#" class="menu-item">방명록</a>
            <a href="#" class="menu-item" style="color: var(--n-green);">모바일초대장</a>
        </nav>
    </div>
</header>

</body>
</html>
