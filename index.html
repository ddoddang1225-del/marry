<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDodang Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-soft-pink: #FFF0F0; /* 공주의 핑크 배경색 */
            --point-yellow: #FFF59D; /* 포스트잇 노란색 */
            --header-blue: #A9D1F7;  /* 로고 하늘색 */
            --menu-green: #DCEDC8;   /* 상단 메뉴 연두색 */
            --white: #FFFFFF;
            --text-dark: #333333;
        }

        /* 파란 선 삭제하고 깔끔한 배경만 남겼어! */
        body {
            background-color: var(--bg-soft-pink);
            font-family: 'Gaegu', cursive;
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            box-sizing: border-box;
        }

        .phone-frame {
            width: 100%; max-width: 900px;
            display: flex; flex-direction: column;
            padding: 20px;
        }

        /* 헤더 섹션: 로고를 오른쪽(flex-end)으로! */
        header {
            display: flex; 
            flex-direction: row-reverse; /* 요소 순서를 반대로 해서 로고를 우측으로! */
            align-items: center;
            border-bottom: 3px solid #5D4037;
            padding-bottom: 15px; margin-bottom: 30px;
            gap: 20px;
        }
        
        .logo { 
            font-size: 3.5rem; color: var(--header-blue); 
            font-weight: bold; text-shadow: 2px 2px #555;
            margin-left: 20px; /* 메뉴와 간격 조절 */
        }

        .nav-group { display: flex; gap: 10px; }
        .nav-item {
            width: 110px; height: 45px;
            background-color: var(--menu-green);
            border: 1px solid #999;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* 메인 컨텐츠 섹션 */
        .main-container { display: flex; gap: 30px; }

        /* 왼쪽 사이드바 (인물 정보) */
        .sidebar { width: 220px; display: flex; flex-direction: column; gap: 25px; }
        .sidebar-title { text-align: center; font-size: 1.8rem; margin-bottom: 10px; font-weight: bold; }
        .info-card {
            background-color: var(--point-yellow);
            padding: 20px; border: 1px solid #ccc;
            position: relative; box-shadow: 3px 3px 5px rgba(0,0,0,0.1);
        }
        .info-card::before, .info-card::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            background: #555; border-radius: 50%; top: 12px;
        }
        .info-card::before { left: 12px; } .info-card::after { right: 12px; }
        .info-card p { margin: 8px 0; font-size: 1.4rem; text-align: center; }

        /* 중앙 메인 (사진 및 날짜 정보) */
        .content-body {
            flex: 1; display: flex; flex-direction: column; align-items: center;
        }
        .photo-box {
            width: 400px; height: 450px;
            background-color: #D9D9D9;
            border: 1px solid #999;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; margin-bottom: 30px;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        /* 하단 정보 박스 */
        .details-box {
            background-color: var(--white);
            width: 100%; padding: 25px; text-align: center;
            font-size: 1.8rem; line-height: 1.7;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="phone-frame">
    <header>
        <div class="logo">DDodang</div>
        <div class="nav-group">
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-title">결혼</div>
            <div class="info-card">
                <p>신랑 : 이진현</p>
                <p style="font-size: 1.1rem; margin-top: 15px;">아버님, 어머님</p>
            </div>
            <div class="info-card">
                <p>신부 : 조윤담</p>
                <p style="font-size: 1.1rem; margin-top: 15px;">엄마, 아빠 장녀</p>
            </div>
        </aside>

        <main class="content-body">
            <div class="photo-box">
                <img src="images/danag.jpg" alt="메인 사진">
            </div>
            <div class="details-box">
                날짜 : 2027 . 10 . 09 (토요일)<br>
                시간 : 12시 (정오)<br>
                장소 : 롯데월드민속박물관
            </div>
        </main>
    </div>
</div>

</body>
</html>
