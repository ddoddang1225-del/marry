<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDodang Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pink: #FFF0F0;
            --point-yellow: #FFF59D;
            --header-blue: #A9D1F7;
            --menu-green: #DCEDC8;
            --line-brown: #5D4037;
            --white: #FFFFFF;
        }

        body {
            background-color: var(--bg-pink);
            font-family: 'Gaegu', cursive;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* [수정] 헤더: 1440px 규격 & 로고 오른쪽 배치 */
        header {
            width: 100%;
            max-width: 1440px; /* 공주가 정한 규격 */
            height: 120px;
            display: flex;
            justify-content: flex-end; /* 오른쪽 끝으로 밀기 */
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            border-bottom: 4px solid var(--line-brown);
            gap: 30px;
        }

        /* [수정] DDodang 이름 크기 48px */
        .logo {
            font-size: 48px; 
            color: var(--header-blue);
            font-weight: bold;
            text-shadow: 2px 2px #555;
        }

        /* 중간에 들어가는 네모 상자 3개 */
        .nav-group { display: flex; gap: 20px; }
        .nav-item {
            width: 110px; height: 50px;
            background-color: var(--menu-green);
            border: 1px solid #999;
            box-shadow: 3px 3px 0px var(--line-brown);
        }

        /* 메인 컨텐츠 영역 */
        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1440px; /* 규격 통일 */
            min-height: calc(100vh - 120px);
        }

        /* [수정] 왼쪽 사이드바: 300px~400px 메모장 크기 */
        .left-sidebar {
            width: 350px; /* 300~400 사이 적정값 */
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px;
            border-right: 4px solid var(--line-brown); /* 세로 구분선 */
            box-sizing: border-box;
        }

        .sidebar-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 30px; }

        /* 메모장 스타일 포스트잇 */
        .memo-pad {
            width: 280px; 
            background-color: var(--point-yellow);
            padding: 30px 20px;
            border: 1px solid #ccc;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            position: relative;
        }
        .memo-pad::before, .memo-pad::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            background: #555; border-radius: 50%; top: 15px;
        }
        .memo-pad::before { left: 15px; } .memo-pad::after { right: 15px; }

        .memo-pad p { margin: 10px 0; font-size: 1.8rem; text-align: center; line-height: 1.4; }

        /* [수정] 메인 컨텐츠 영역 */
        .main-content {
            flex: 1; /* 남은 공간 모두 사용 */
            display: flex; flex-direction: column; align-items: center;
            padding: 50px;
            box-sizing: border-box;
        }

        /* 사진 영역 */
        .photo-frame {
            width: 100%; max-width: 600px; height: 500px;
            background-color: #D9D9D9;
            border: 2px solid var(--line-brown);
            margin-bottom: 40px;
            overflow: hidden;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* 흰색 박스 글씨 */
        .white-text-box {
            background-color: var(--white);
            width: 100%; max-width: 700px;
            padding: 40px;
            border: 1px solid #ddd;
            text-align: center;
            font-size: 2.2rem;
            line-height: 1.8;
            box-shadow: 10px 10px 0px var(--menu-green); /* 포인트 디자인 */
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
        </div>
        <div class="logo">DDodang</div>
    </header>

    <div class="main-wrapper">
        <aside class="left-sidebar">
            <div class="sidebar-title">결혼</div>
            
            <div class="memo-pad">
                <p>신랑 : 이진현</p>
                <p style="font-size: 1.3rem; margin-top: 20px;">아버님, 어머님</p>
            </div>

            <div class="memo-pad">
                <p>신부 : 조윤담</p>
                <p style="font-size: 1.3rem; margin-top: 20px;">엄마, 아빠 장녀</p>
            </div>
        </aside>

        <main class="main-content">
            <div class="photo-frame">
                <img src="images/danag.jpg" alt="메인 사진">
            </div>
            
            <div class="white-text-box">
                날짜 : 2027 . 10 . 09 (토요일)<br>
                시간 : 12시 (정오)<br>
                장소 : 롯데월드민속박물관
            </div>
        </main>
    </div>

</body>
</html>
