<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDodang Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pink: #FFF0F0;
            --point-yellow: #FFF59D;
            --header-blue: #A9D1F7;
            --menu-green: #DCEDC8;
            --line-brown: #5D4037;
            --white: #FFFFFF;
        }

        body {
            background-color: var(--bg-pink);
            font-family: 'Gaegu', cursive;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        header {
            width: 100%;
            height: 120px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            box-sizing: border-box;
            border-bottom: 4px solid var(--line-brown);
            background-color: var(--bg-pink);
        }

        .logo {
            font-size: 3.5rem; color: var(--header-blue);
            font-weight: bold; text-shadow: 2px 2px #555;
        }

        .nav-group { display: flex; gap: 15px; }
        .nav-item {
            width: 100px; height: 45px;
            background-color: var(--menu-green);
            border: 1px solid #999;
        }

        .main-wrapper {
            display: flex;
            flex: 1;
            width: 100%;
        }

        /* [수정] 왼쪽 섹션: 내부 정렬을 오른쪽 끝(세로선 쪽)으로 밀었어! */
        .left-section {
            flex: 1; 
            display: flex; flex-direction: column; 
            align-items: flex-end; /* 모든 요소를 오른쪽(세로선 쪽)으로 밀기 */
            padding-top: 40px;
            padding-right: 30px; /* 세로선에서 살짝만 띄우기 */
            border-right: 4px solid var(--line-brown);
            box-sizing: border-box;
        }

        /* [수정] '결혼' 타이틀 크기 조금 작게 */
        .sidebar-title { font-size: 2.2rem; font-weight: bold; margin-bottom: 25px; }

        /* [수정] 포스트잇 크기 축소 (220px -> 180px) */
        .post-it {
            width: 180px; 
            background-color: var(--point-yellow);
            padding: 20px 10px; border: 1px solid #ccc;
            margin-bottom: 25px; position: relative;
            box-shadow: 4px 4px 6px rgba(0,0,0,0.1);
        }
        .post-it::before, .post-it::after {
            content: ''; position: absolute; width: 10px; height: 10px;
            background: #555; border-radius: 50%; top: 10px;
        }
        .post-it::before { left: 10px; } .post-it::after { right: 10px; }
        .post-it p { margin: 8px 0; font-size: 1.4rem; text-align: center; }

        .right-section {
            flex: 2;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px;
        }

        .photo-box {
            width: 100%; max-width: 450px; height: 500px;
            background-color: #D9D9D9; border: 1px solid #999;
            margin-bottom: 30px; overflow: hidden;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        .details-box {
            background-color: var(--white);
            width: 100%; max-width: 550px;
            padding: 25px; border: 1px solid #ddd;
            text-align: center; font-size: 1.8rem; line-height: 1.8;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">DDodang</div>
        <div class="nav-group">
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
        </div>
    </header>

    <div class="main-wrapper">
        <aside class="left-section">
            <div class="sidebar-title">결혼</div>
            
            <div class="post-it">
                <p>신랑 : 이진현</p>
                <p style="font-size: 1rem; margin-top: 12px;">아버님, 어머님</p>
            </div>

            <div class="post-it">
                <p>신부 : 조윤담</p>
                <p style="font-size: 1rem; margin-top: 12px;">엄마, 아빠 장녀</p>
            </div>
        </aside>

        <main class="right-section">
            <div class="photo-box">
                <img src="images/danag.jpg" alt="메인 사진">
            </div>
            <div class="details-box">
                날짜 : 2027 . 10 . 09 (토요일)<br>
                시간 : 12시 (정오)<br>
                장소 : 롯데월드민속박물관
            </div>
        </main>
    </div>

</body>
</html>
