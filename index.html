<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEDDING INVITE</title>
    
    <style>
        /* [폰트 설정] */
        @font-face {
            font-family: 'Cafe24Ssukssuk';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Ssukssuk.woff') format('woff');
        }
        @font-face {
            font-family: 'Ownglyph_Uiyeon';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_220508@1.0/Ownglyph_Uiyeon.woff') format('woff');
        }
        @font-face {
            font-family: 'Cafe24Decoline';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.1/Cafe24Decoline.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-pink: #FFF0F1; 
            --bg-blue-point: #C3D7F4; 
            --text-black: #1A1A1A;
            --menu-gray: #4A4A4A;
            --dropdown-bg: #2C2C2C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-pink);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* [상단 헤더 - 슬림하게 수정됨] */
        header.site-header {
            width: 100%;
            padding: 10px 20px 8px 20px; /* 상단 박스 높이 줄임 */
            background-color: var(--bg-pink);
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-top {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: center; 
            align-items: center; 
            position: relative; 
            margin-bottom: 5px; /* 네비게이션과의 간격 좁힘 */
            min-height: 50px;   
        }

        /* [또댕 로고 - PC 크기 조절] */
        .header-left-logo {
            position: absolute;
            left: 20px;      
            top: 70%;        
            transform: translateY(-50%); 
            z-index: 5;
        }

        .header-left-logo img {
            max-width: 150px; /* ★PC 로고 크기 (원하는 대로 조절해!) */
            height: auto;
            display: block;
        }

        /* [영문 감성 문구 스타일] */
        .header-title a {
            font-family: 'Cafe24Decoline', serif;
            font-size: 32px; /* 문구 크기 */
            color: var(--text-black);
            text-decoration: none;
            letter-spacing: 4px;
            white-space: nowrap;
            text-transform: uppercase;
        }

        /* [네비게이션 스타일] */
        .nav-container {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 60px; 
        }

        .nav-item {
            font-family: 'Cafe24Ssukssuk', sans-serif;
            font-size: 17px;
            color: var(--menu-gray);
            cursor: pointer;
            padding-bottom: 3px;
        }

        /* [메인 사진 영역] */
        .main-content {
            position: relative;
            width: 100%;
            height: 700px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
            font-family: 'Ownglyph_Uiyeon', sans-serif;
            background-image: url('images/danag.jpg'); 
            background-size: contain; 
            background-position: center;  
            background-repeat: no-repeat;
            background-color: var(--bg-blue-point); 
        }

        .info-wrap {
            position: relative;
            z-index: 2;
            margin-top: 60px; 
        }

        .info-date { font-size: 30px; margin-bottom: 10px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .info-time { font-size: 26px; margin-bottom: 30px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .info-location { font-size: 28px; line-height: 1.6; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }

        /* [모바일 대응 - 로고 크기 포함] */
        @media (max-width: 768px) {
            header.site-header { padding: 10px 15px 5px 15px; }
            .header-top {
                flex-direction: column;
                position: static;
                min-height: auto;
            }
            .header-left-logo {
                position: static;
                transform: none;
                margin-bottom: 8px;
            }
            .header-left-logo img { 
                max-width: 80px; /* ★모바일 로고 크기 (귀엽게 줄여놓음!) */
                margin: 0 auto; 
            } 
            .header-title a { 
                font-size: 20px; 
                letter-spacing: 2px;
            }
            .nav-container { gap: 15px; } 
            .nav-item { font-size: 14px; }
            
            .main-content { 
                height: 500px; 
                background-size: cover; 
            }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-top">
            <div class="header-left-logo">
                <img src="images/또댕 로고.png" alt="또댕 로고">
            </div>
            
            <div class="header-title">
                <a href="/">Together, as always meant to be</a>
            </div>
        </div>
        
        <nav class="nav-container">
            <div class="nav-item">결혼식 안내</div>
            <div class="nav-item">예약 및 문의</div>
            <div class="nav-item">지도</div>
            <div class="nav-item">GALLERY</div>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-wrap">
            <div class="info-date">날짜 : 2027. 10. 09. 토요일</div>
            <div class="info-time">시간 : PM 12:00</div>
            <div class="info-location">
                장소 : 롯데월드 민속박물관<br>
                전통혼례장
            </div>
        </div>
    </main>

</body>
</html>
