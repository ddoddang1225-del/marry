<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이진현 & 조윤담</title>
    
    <style>
        /* 빙그레 싸만코체 */
        @font-face {
            font-family: 'BinggraeSamanco-Bold';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10@1.0/BinggraeSamanco-Bold.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        /* 카페24 쑥쑥체 */
        @font-face {
            font-family: 'Cafe24Ssukssuk';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Ssukssuk.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        /* 온글잎 의연체 */
        @font-face {
            font-family: 'Ownglyph_Uiyeon';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_220508@1.0/Ownglyph_Uiyeon.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
    </style>

    <style>
        :root {
            --bg-pink: #FFF0F1;
            --text-black: #1A1A1A;
            --menu-gray: #4A4A4A;
            --dropdown-bg: #2C2C2C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-pink);
            overflow-x: hidden;
        }

        /* [상단 헤더 - 슬림 버전] */
        header.wedding-header {
            width: 100%;
            padding: 30px 20px 15px 20px; /* 더 슬림하게 조정 */
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-pink);
            border-bottom: 1px dashed #555; 
        }

        .logo { margin-bottom: 15px; } 
        
        .logo a {
            /* 빙그레 싸만코체 적용 */
            font-family: 'BinggraeSamanco-Bold', sans-serif;
            font-size: 52px;
            color: var(--text-black);
            text-decoration: none;
            letter-spacing: 1px;
            display: block;
            text-align: center;
            line-height: 1.1;
        }

        .nav-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .nav-group { position: relative; }

        .nav-item {
            /* 카페24 쑥쑥체 적용 */
            font-family: 'Cafe24Ssukssuk', sans-serif;
            text-decoration: none;
            font-size: 19px; /* 폰트 특성에 맞춰 크기 살짝 조정 */
            color: var(--menu-gray);
            cursor: pointer;
            padding-bottom: 5px;
            transition: all 0.3s ease;
        }

        .nav-item.active { color: var(--text-black); }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%);
            width: 170px;
            background-color: var(--dropdown-bg);
            z-index: 1000;
            padding: 8px 0;
            border-radius: 4px;
        }

        .dropdown-menu.show { display: block; }

        .dropdown-item {
            /* 서브 메뉴도 쑥쑥체 */
            font-family: 'Cafe24Ssukssuk', sans-serif;
            padding: 10px 15px;
            color: #ddd;
            font-size: 16px;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        /* [본문 영역 - 온글잎 의연체] */
        .main-content {
            width: 100%;
            min-height: 500px;
            background-color: #89A9D6; 
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            text-align: center;
            /* 온글잎 의연체 적용 */
            font-family: 'Ownglyph_Uiyeon', sans-serif;
        }

        .wedding-date { font-size: 32px; margin-bottom: 5px; }
        .wedding-time { font-size: 26px; margin-bottom: 25px; }
        .wedding-location { font-size: 28px; line-height: 1.4; }

        @media (max-width: 768px) {
            header.wedding-header { padding: 25px 15px 10px 15px; }
            .logo a { font-size: 36px; }
            .nav-container { gap: 15px; }
            .nav-item { font-size: 16px; }
            .wedding-date { font-size: 26px; }
            .wedding-location { font-size: 22px; }
        }
    </style>
</head>
<body>

    <header class="wedding-header">
        <div class="logo">
            <a href="/">이진현 & 조윤담</a>
        </div>

        <nav class="nav-container">
            <div class="nav-group">
                <div class="nav-item active" onclick="toggleDropdown(event, 'wedding-drop')">결혼식 안내</div>
                <div id="wedding-drop" class="dropdown-menu">
                    <a href="#" class="dropdown-item">결혼식 오는 길</a>
                    <a href="#" class="dropdown-item">또댕이들이 걸어온 길</a>
                </div>
            </div>
            <div class="nav-item">예약 및 문의</div>
            <div class="nav-item">기타</div>
            <div class="nav-item">GALLERY</div>
        </nav>
    </header>

    <main class="main-content">
        <div class="wedding-date">2027. 10. 09. SAT</div>
        <div class="wedding-time">PM 12:00</div>
        <div class="wedding-location">롯데월드 민속박물관<br>전통혼례장</div>
    </main>

    <script>
        function toggleDropdown(event, dropId) {
            event.stopPropagation();
            const dropdown = document.getElementById(dropId);
            const allDrops = document.getElementsByClassName("dropdown-menu");
            for(let d of allDrops) { if(d.id !== dropId) d.classList.remove('show'); }
            dropdown.classList.toggle('show');
        }

        window.onclick = function(event) {
            const dropdowns = document.getElementsByClassName("dropdown-menu");
            for (let i = 0; i < dropdowns.length; i++) {
                if (dropdowns[i].classList.contains('show')) {
                    dropdowns[i].classList.remove('show');
                }
            }
        }
    </script>

</body>
</html>
