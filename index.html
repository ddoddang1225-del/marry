<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDodang Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-soft-pink: #FFF0F0;
            --point-yellow: #FFF59D;
            --header-blue: #A9D1F7;
            --menu-green: #DCEDC8;
            --white: #FFFFFF;
            --text-dark: #333333;
            --line-brown: #5D4037;
        }

        body {
            background-color: var(--bg-soft-pink);
            font-family: 'Gaegu', cursive;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 상단바: 화면 전체 가로지르는 선 */
        header {
            width: 100%;
            display: flex; 
            justify-content: flex-end;
            align-items: center;
            border-bottom: 4px solid var(--line-brown);
            padding: 20px 40px;
            box-sizing: border-box;
            background-color: var(--bg-soft-pink);
            gap: 25px;
        }
        
        .logo { 
            font-size: 3.5rem; color: var(--header-blue); 
            font-weight: bold; text-shadow: 2px 2px #555;
            order: 2;
        }

        .nav-group { display: flex; gap: 15px; order: 1; }
        .nav-item {
            width: 120px; height: 50px;
            background-color: var(--menu-green);
            border: 1px solid #999;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.1);
        }

        /* [수정] 메인 컨텐츠 영역: 전체 화면 비율 조정 */
        .main-wrapper {
            display: flex;
            width: 100%;
            max-width: 1200px; /* 화면이 너무 커도 비율 유지 */
            min-height: calc(100vh - 120px); /* 헤더 제외 남은 높이 */
        }

        /* 왼쪽 2/3 영역: 사진과 날짜 정보 */
        .content-body {
            flex: 2; /* 2만큼 차지 */
            display: flex; flex-direction: column; align-items: center;
            padding: 40px;
            box-sizing: border-box;
        }

        /* [추가] 세로 구분선 */
        .vertical-line {
            width: 3px;
            background-color: var(--line-brown);
            margin: 40px 0; /* 위아래 여백 */
        }

        /* 오른쪽 1/3 영역: 결혼 & 포스트잇 정보 */
        .sidebar {
            flex: 1; /* 1만큼 차지 (전체의 1/3) */
            display: flex; flex-direction: column; align-items: center;
            padding: 40px;
            box-sizing: border-box;
            gap: 30px;
        }

        .sidebar-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 10px; }

        .info-card {
            width: 100%; max-width: 280px;
            background-color: var(--point-yellow);
            padding: 30px 20px; border: 1px solid #ccc;
            position: relative; box-shadow: 4px 4px 8px rgba(0,0,0,0.1);
        }
        .info-card::before, .info-card::after {
            content: ''; position: absolute; width: 14px; height: 14px;
            background: #555; border-radius: 50%; top: 12px;
        }
        .info-card::before { left: 12px; } .info-card::after { right: 12px; }
        .info-card p { margin: 10px 0; font-size: 1.8rem; text-align: center; }

        /* 사진 및 날짜 박스 스타일링 */
        .photo-box {
            width: 100%; max-width: 500px; height: 500px;
            background-color: #D9D9D9; border: 1px solid #999;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; margin-bottom: 40px;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        .details-box {
            background-color: var(--white);
            width: 100%; max-width: 600px; padding: 30px; text-align: center;
            font-size: 2.2rem; line-height: 1.8;
            border: 1px solid #ddd;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">DDodang</div>
        <div class="nav-group">
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
        </div>
    </header>

    <div class="main-wrapper">
        <main class="content-body">
            <div class="photo-box">
                <img src="images/danag.jpg" alt="메인 사진">
            </div>
            <div class="details-box">
                날짜 : 2027 . 10 . 09 (토요일)<br>
                시간 : 12시 (정오)<br>
                장소 : 롯데월드민속박물관
            </div>
        </main>

        <div class="vertical-line"></div>

        <aside class="sidebar">
            <div class="sidebar-title">결혼</div>
            <div class="info-card">
                <p>신랑 : 이진현</p>
                <p style="font-size: 1.3rem; margin-top: 20px;">아버님, 어머님</p>
            </div>
            <div class="info-card">
                <p>신부 : 조윤담</p>
                <p style="font-size: 1.3rem; margin-top: 20px;">엄마, 아빠 장녀</p>
            </div>
        </aside>
    </div>

</body>
</html>
