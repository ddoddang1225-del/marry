<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEDDING INVITE</title>
    
    <style>
        /* [폰트 설정] */
        @font-face {
            font-family: 'Cafe24Ssukssuk';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Ssukssuk.woff') format('woff');
        }
        @font-face {
            font-family: 'Ownglyph_Uiyeon';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_220508@1.0/Ownglyph_Uiyeon.woff') format('woff');
        }
        @font-face {
            font-family: 'Cafe24Decoline';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.1/Cafe24Decoline.woff2') format('woff2');
        }

        :root {
            --bg-pink: #FFF0F1; 
            --bg-blue-point: #C3D7F4; 
            --text-black: #1A1A1A;
            --menu-gray: #4A4A4A;
            --box-border: #E8E8E8; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-pink); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* [상단 헤더] */
        header.site-header {
            width: 100%;
            padding: 10px 15px 12px 15px; 
            background-color: var(--bg-pink);
            position: relative;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* [PC 레이아웃] */
        .header-top {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: center; 
            align-items: center; 
            position: relative; 
            margin-bottom: 15px;
            min-height: 50px;
        }

        .header-left-logo {
            position: absolute;
            left: 0;
            top: 90%; 
            transform: translateY(-50%);
        }
        .header-left-logo img {
            max-width: 100px;
            height: auto;
            display: block;
        }

        .header-title a {
            font-family: 'Cafe24Decoline', serif;
            font-size: 32px;
            color: var(--text-black);
            text-decoration: none;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .nav-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: flex-end; 
            gap: 10px;
        }
        .nav-group { flex: 0 1 140px; }

        .nav-item {
            font-family: 'Cafe24Ssukssuk', sans-serif;
            font-size: 14px;
            color: var(--menu-gray);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 36px;
            background-color: rgba(255, 255, 255, 0.6);
            border: 1px solid var(--box-border);
            border-radius: 6px;
        }

        /* [메인 콘텐츠 - PC 사진 비율] */
        .main-content {
            width: 100%;
            min-height: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url('images/danag.jpg');
            background-size: contain;
            background-position: center top;
            background-repeat: no-repeat;
            background-color: var(--bg-blue-point);
            font-family: 'Ownglyph_Uiyeon', sans-serif;
            color: white;
            text-align: center;
        }

        .info-wrap { margin-top: 40px; }
        .info-date { font-size: 32px; margin-bottom: 10px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .info-time { font-size: 28px; margin-bottom: 30px; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }
        .info-location { font-size: 30px; line-height: 1.6; text-shadow: 2px 2px 8px rgba(0,0,0,0.7); }

        /* [📱 모바일 버전 - 로고/글씨/사진 모두 수정] */
        @media (max-width: 768px) {
            header.site-header { padding: 10px 10px; }
            
            /* 1. 로고랑 글씨 한 줄에 나란히 배치 */
            .header-top {
                display: flex;
                flex-direction: row; /* 가로 나열 */
                justify-content: center;
                gap: 8px; /* 로고와 글씨 사이 간격 */
                min-height: 40px;
                margin-bottom: 12px;
            }
            
            .header-left-logo {
                position: static; /* absolute 풀고 나란히 배치 */
                transform: none;
            }
            
            .header-left-logo img {
                max-width: 45px; /* 로고를 앙증맞게 줄임 */
            }

            .header-title a {
                font-size: 14px; /* 글씨도 한 줄에 들어가게 조절 */
                letter-spacing: 0px;
            }

            /* 2. 네모 박스 한 줄 유지 */
            .nav-container {
                justify-content: center;
                gap: 4px;
            }
            .nav-group { flex: 1; }
            .nav-item { font-size: 10px; height: 30px; }

            /* 3. 사진 크기 원래대로 (비율 유지) */
            .main-content {
                min-height: auto;
                height: auto;
                aspect-ratio: 3 / 4; /* 세로형 사진 비율에 맞춰 자동 조절 (사진에 따라 9/16 등으로 조절 가능) */
                background-size: cover; /* 모바일은 꽉 차게 */
            }
            
            .info-wrap { margin-top: 30px; }
            .info-date { font-size: 22px; }
            .info-time { font-size: 18px; }
            .info-location { font-size: 20px; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-top">
            <div class="header-left-logo">
                <img src="images/또댕 로고.png" alt="또댕 로고">
            </div>
            <div class="header-title">
                <a href="/">Together, as always meant to be</a>
            </div>
        </div>
        
        <nav class="nav-container">
            <div class="nav-group"><div class="nav-item">결혼식 안내</div></div>
            <div class="nav-group"><div class="nav-item">예약 및 문의</div></div>
            <div class="nav-group"><div class="nav-item">지도</div></div>
            <div class="nav-group"><div class="nav-item">GALLERY</div></div>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-wrap">
            <div class="info-date">날짜 : 2027. 10. 09. 토요일</div>
            <div class="info-time">시간 : PM 12:00</div>
            <div class="info-location">장소 : 롯데월드 민속박물관<br>전통혼례장</div>
        </div>
    </main>

</body>
</html>
