<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이진현 & 조윤담</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pink: #FFF0F1;
            --text-black: #1A1A1A;
            --menu-gray: #4A4A4A;
            --dropdown-bg: #2C2C2C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-pink);
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }

        /* [상단 헤더 영역 - 건드리지 않음] */
        header.wedding-header {
            width: 100%;
            padding: 80px 20px 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-pink);
            border-bottom: 1.5px dashed #333; 
        }

        .logo { margin-bottom: 50px; }
        .logo a {
            font-size: 56px;
            font-weight: 700;
            color: var(--text-black);
            text-decoration: none;
            letter-spacing: 4px;
            display: block;
            text-align: center;
        }

        .nav-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .nav-group { position: relative; }

        .nav-item {
            text-decoration: none;
            font-size: 18px;
            font-weight: 400;
            color: var(--menu-gray);
            cursor: pointer;
            padding-bottom: 10px;
            transition: all 0.3s ease;
        }

        .nav-item.active { color: var(--text-black); font-weight: 700; }

        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 200px;
            background-color: var(--dropdown-bg);
            z-index: 1000;
            padding: 10px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .dropdown-menu.show { display: block; }

        .dropdown-item {
            padding: 12px 20px;
            color: #ccc;
            font-size: 15px;
            text-decoration: none;
            display: block;
        }

        .dropdown-item:hover { background-color: #444; color: #fff; }

        /* -------------------------------------------------- */
        /* [본문 영역 - 공주가 말한 아래쪽 추가 부분] */
        /* -------------------------------------------------- */
        .main-content {
            width: 100%;
            min-height: 600px;
            /* 배경을 파란색 대신 은은한 핑크나 화이트로 하고 싶으면 여기서 조절해! */
            background-color: #89A9D6; 
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white; /* 파란 배경이라 글씨는 하얗게! */
            text-align: center;
        }

        .wedding-date {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .wedding-time {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 30px;
        }

        .wedding-location {
            font-size: 22px;
            font-weight: 500;
            line-height: 1.6;
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .logo a { font-size: 32px; }
            .nav-container { gap: 15px; }
            .nav-item { font-size: 14px; }
            .wedding-date { font-size: 20px; }
            .wedding-location { font-size: 18px; }
        }
    </style>
</head>
<body>

    <header class="wedding-header">
        <div class="logo">
            <a href="/">이진현 & 조윤담</a>
        </div>

        <nav class="nav-container">
            <div class="nav-group">
                <div class="nav-item active" onclick="toggleDropdown(event, 'wedding-drop')">결혼식 안내</div>
                <div id="wedding-drop" class="dropdown-menu">
                    <a href="#" class="dropdown-item">결혼식 오는 길</a>
                    <a href="#" class="dropdown-item">또댕이들이 걸어온 길</a>
                </div>
            </div>
            <div class="nav-item">예약 및 문의</div>
            <div class="nav-item">기타</div>
            <div class="nav-item">GALLERY</div>
        </nav>
    </header>

    <main class="main-content">
        <div class="wedding-date">2027. 10. 09. SAT</div>
        <div class="wedding-time">PM 12:00</div>
        
        <div class="wedding-location">
            롯데월드 민속박물관<br>
            전통혼례장
        </div>
    </main>

    <script>
        // 드롭다운 토글 함수
        function toggleDropdown(event, dropId) {
            event.stopPropagation();
            const dropdown = document.getElementById(dropId);
            
            // 모든 드롭다운을 일단 닫고 시작 (다른게 열려있을 수 있으니)
            const allDrops = document.getElementsByClassName("dropdown-menu");
            for(let d of allDrops) {
                if(d.id !== dropId) d.classList.remove('show');
            }

            dropdown.classList.toggle('show');
        }

        // 바깥 클릭 시 드롭다운 닫기
        window.onclick = function(event) {
            const dropdowns = document.getElementsByClassName("dropdown-menu");
            for (let i = 0; i < dropdowns.length; i++) {
                if (dropdowns[i].classList.contains('show')) {
                    dropdowns[i].classList.remove('show');
                }
            }
        }
    </script>

</body>
</html>
