<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DDodang Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pink: #FFF0F0;
            --c-blue: #A9D1F7;
            --c-green: #DCEDC8;
            --c-brown: #5D4037;
            --n-border: #DBDFE4;
            --max-w: 1280px;
        }

        body {
            background-color: var(--bg-pink);
            font-family: 'Gaegu', cursive;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* [Header] 네이버 규격을 가져온 상단 영역 */
        #header {
            width: 100%;
            display: flex;
            justify-content: center;
            background-color: var(--bg-pink);
        }

        .header_inner {
            width: 100%;
            max-width: var(--max-w);
            display: flex;
            justify-content: space-between; /* 양 끝 정렬 */
            align-items: center;
            padding: 20px 40px;
            box-sizing: border-box;
            border-bottom: 5px solid var(--c-brown); /* 시안의 그 갈색 선! */
        }

        /* [Logo] 하늘색 48px DDodang */
        .search_logo { margin: 0; }
        .search_logo a {
            text-decoration: none;
            font-size: 48px;
            font-weight: bold;
            color: var(--c-blue);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.05);
            letter-spacing: -1px;
        }

        /* [Menu] 연두색 버튼 3개 */
        .shortcut_area { display: flex; align-items: center; }
        .shortcut_list {
            display: flex;
            gap: 15px;
            margin: 0; padding: 0;
            list-style: none;
        }

        .shortcut_item a {
            display: block;
            width: 90px;
            height: 45px;
            background-color: var(--c-green);
            border: 1.5px solid #888;
            border-radius: 6px;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .shortcut_item a:hover {
            transform: scale(1.1);
            background-color: #c5e1a5;
        }

        /* [Mobile] 핸드폰에서 사이즈 자동 조절 (안 깨짐!) */
        @media (max-width: 830px) {
            .header_inner { padding: 15px 20px; border-bottom-width: 4px; }
            .search_logo a { font-size: 32px; }
            .shortcut_item a { width: 65px; height: 35px; }
            .shortcut_list { gap: 10px; }
        }

        @media (max-width: 480px) {
            .header_inner { padding: 10px 15px; }
            .search_logo a { font-size: 26px; }
            .shortcut_item a { width: 50px; height: 30px; }
            .shortcut_list { gap: 8px; }
        }

        .blind { position: absolute; width: 1px; height: 1px; clip: rect(0 0 0 0); overflow: hidden; }
    </style>
</head>
<body>

<header id="header">
    <div class="header_inner">
        <h1 class="search_logo">
            <a href="/">DDodang</a>
        </h1>

        <div class="shortcut_area">
            <ul class="shortcut_list">
                <li class="shortcut_item"><a href="#"><span class="blind">Menu 1</span></a></li>
                <li class="shortcut_item"><a href="#"><span class="blind">Menu 2</span></a></li>
                <li class="shortcut_item"><a href="#"><span class="blind">Menu 3</span></a></li>
            </ul>
        </div>
    </div>
</header>

</body>
</html>
