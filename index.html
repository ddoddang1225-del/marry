<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDodang Wedding</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pink: #FFF0F0;
            --point-yellow: #FFF59D;
            --header-blue: #A9D1F7;
            --menu-green: #DCEDC8;
            --line-brown: #5D4037;
            --white: #FFFFFF;
        }

        body {
            background-color: var(--bg-pink);
            font-family: 'Gaegu', cursive;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            min-height: 100vh;
        }

        /* [수정] 헤더: 로고는 왼쪽 끝, 메뉴는 오른쪽 끝! */
        header {
            width: 100%;
            height: 120px;
            display: flex;
            justify-content: space-between; /* 양 끝으로 벌리기 */
            align-items: center;
            padding: 0 50px;
            box-sizing: border-box;
            border-bottom: 4px solid var(--line-brown); /* 가로선 */
            background-color: var(--bg-pink);
        }

        .logo {
            font-size: 3.5rem; color: var(--header-blue);
            font-weight: bold; text-shadow: 2px 2px #555;
        }

        .nav-group { display: flex; gap: 15px; }
        .nav-item {
            width: 100px; height: 45px;
            background-color: var(--menu-green);
            border: 1px solid #999;
        }

        /* 메인 컨텐츠 영역 */
        .main-wrapper {
            display: flex;
            flex: 1;
            width: 100%;
        }

        /* 왼쪽 1/3 (결혼 정보 & 포스트잇) */
        .left-section {
            flex: 1; 
            display: flex; flex-direction: column; align-items: center;
            padding-top: 40px;
            border-right: 4px solid var(--line-brown); /* 세로선 */
        }

        .sidebar-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 30px; }

        .post-it {
            width: 220px; background-color: var(--point-yellow);
            padding: 25px 15px; border: 1px solid #ccc;
            margin-bottom: 30px; position: relative;
            box-shadow: 4px 4px 6px rgba(0,0,0,0.1);
        }
        .post-it::before, .post-it::after {
            content: ''; position: absolute; width: 12px; height: 12px;
            background: #555; border-radius: 50%; top: 10px;
        }
        .post-it::before { left: 10px; } .post-it::after { right: 10px; }
        .post-it p { margin: 10px 0; font-size: 1.6rem; text-align: center; }

        /* 오른쪽 2/3 (사진 & 정보) */
        .right-section {
            flex: 2;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px;
        }

        .photo-box {
            width: 100%; max-width: 500px; height: 500px;
            background-color: #D9D9D9; border: 1px solid #999;
            margin-bottom: 30px; overflow: hidden;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.05);
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        .details-box {
            background-color: var(--white);
            width: 100%; max-width: 600px;
            padding: 30px; border: 1px solid #ddd;
            text-align: center; font-size: 2rem; line-height: 1.8;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.
