<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDODANG</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pink: #FFF0F1; /* 사진 속 아주 연한 핑크 */
            --text-black: #1A1A1A;
            --menu-gray: #4A4A4A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-pink);
            font-family: 'Noto Sans KR', sans-serif;
            /* 가로 스크롤 절대 방지 */
            overflow-x: hidden;
        }

        /* [이상한 점 고치기 1: 전체적인 여백] */
        header.wedding-header {
            width: 100%;
            /* 상단 여백을 충분히 줘서 답답함을 없앴어 */
            padding: 80px 20px 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-pink);
        }

        /* [이상한 점 고치기 2: 로고의 압도감] */
        .logo {
            margin-bottom: 50px; /* 로고와 메뉴 사이 공간 확보 */
        }

        .logo a {
            font-family: 'Oswald', sans-serif;
            font-size: 80px; /* 사진처럼 큼직하게 */
            font-weight: 500;
            color: var(--text-black);
            text-decoration: none;
            letter-spacing: 12px; /* 글자 사이 간격을 넓혀야 고급져보여 */
            line-height: 1;
            text-transform: uppercase;
            display: block;
            /* 모바일에서 글자가 삐져나가지 않게 처리 */
            max-width: 100vw;
            text-align: center;
        }

        /* [이상한 점 고치기 3: 메뉴 정렬] */
        .nav-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            gap: 40px; /* 메뉴 사이 간격 */
            flex-wrap: wrap; /* 모바일에서 자동 줄바꿈 */
        }

        .nav-item {
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            color: var(--menu-gray);
            letter-spacing: -0.5px;
            padding: 5px 10px;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            color: #000;
            font-weight: 500;
        }

        /* [핵심: 모바일에서 안 깨지게 자동 조절] */
        @media (max-width: 768px) {
            header.wedding-header {
                padding: 60px 15px 30px 15px;
            }
            .logo a {
                font-size: 45px; /* 모바일은 로고가 작아져야 안 잘려 */
                letter-spacing: 6px;
            }
            .nav-container {
                gap: 15px; /* 메뉴 간격 좁히기 */
            }
            .nav-item {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <header class="wedding-header">
        <div class="logo">
            <a href="/">DDODANG</a>
        </div>

        <nav class="nav-container">
            <a href="#" class="nav-item">결혼식 안내</a>
            <a href="#" class="nav-item">예약 및 문의</a>
            <a href="#" class="nav-item">기타</a>
            <a href="#" class="nav-item">GALLERY</a>
        </nav>
    </header>

</body>
</html>
