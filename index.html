<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>또당 - DDodang</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gaegu&display=swap" rel="stylesheet">
    <style>
        /* 클릭엔 기반 디자인 시스템 */
        :root {
            --main-pink: #FFF0F0;
            --logo-blue: #A9D1F7;
            --btn-green: #DCEDC8;
            --border-brown: #5D4037;
            --text-dark: #333333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--main-pink);
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* [상단 GNB] */
        .gnb_wrapper {
            width: 100%;
            background-color: var(--main-pink);
            border-bottom: 4px solid var(--border-brown); /* 시안의 그 두꺼운 선 */
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }

        .gnb_container {
            max-width: 1200px;
            margin: 0 auto;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        /* 로고: DDodang */
        .logo_area a {
            font-family: 'Gaegu', cursive;
            font-size: 48px;
            font-weight: bold;
            color: var(--logo-blue);
            text-decoration: none;
            /* 클릭엔 특유의 텍스트 쉐도우 */
            text-shadow: 1px 1px 1px rgba(0,0,0,0.1);
        }

        /* 오른쪽 버튼 그룹 */
        .menu_area {
            display: flex;
            gap: 12px;
        }

        .menu_btn {
            width: 90px;
            height: 42px;
            background-color: var(--btn-green);
            border: 1px solid #777;
            border-radius: 2px; /* 클릭엔은 약간 각진 느낌 */
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .menu_btn:hover {
            opacity: 0.8;
        }

        /* [메인 컨텐츠 영역] - 상단 바 높이만큼 띄워줌 */
        .main_body {
            margin-top: 100px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 이미지 박스 */
        .visual_img {
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .visual_img img {
            width: 100%;
            display: block;
        }

        /* 초대 문구 */
        .intro_text {
            text-align: center;
            font-family: 'Gaegu', cursive;
        }

        .intro_text h2 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #555;
        }

        .intro_text p {
            font-size: 1.5rem;
            color: #777;
        }

        /* [모바일 대응] - 네이버처럼 가로 유지하며 축소 */
        @media (max-width: 768px) {
            .gnb_container {
                height: 70px;
            }
            .logo_area a {
                font-size: 32px;
            }
            .menu_btn {
                width: 60px;
                height: 30px;
            }
            .main_body {
                margin-top: 70px;
            }
        }
    </style>
</head>
<body>

    <nav class="gnb_wrapper">
        <div class="gnb_container">
            <div class="logo_area">
                <a href="/">DDodang</a>
            </div>
            <div class="menu_area">
                <div class="menu_btn"></div>
                <div class="menu_btn"></div>
                <div class="menu_btn"></div>
            </div>
        </div>
    </nav>

    <main class="main_body">
        <div class="visual_img">
            <img src="https://via.placeholder.com/600x800/FFE0E0/ffffff?text=Our+Wedding" alt="Main Photo">
        </div>
        <div class="intro_text">
            <h2>또당 & 진현</h2>
            <p>2027. 10. 09. SAT PM 12:00</p>
            <p>롯데월드 민속박물관 전통혼례장</p>
        </div>
    </main>

</body>
</html>
