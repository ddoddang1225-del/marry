<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEDDING INVITE</title>
    
    <style>
        /* [폰트 설정] */
        @font-face { font-family: 'Cafe24Ssukssuk'; src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/Cafe24Ssukssuk.woff') format('woff'); }
        @font-face { font-family: 'Ownglyph_Uiyeon'; src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_220508@1.0/Ownglyph_Uiyeon.woff') format('woff'); }
        @font-face { font-family: 'Cafe24Decoline'; src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.1/Cafe24Decoline.woff2') format('woff2'); }

        :root {
            --bg-pink: #FFF0F1; 
            --bg-blue-point: #C3D7F4; 
            --text-black: #1A1A1A;
            --menu-gray: #4A4A4A;
            --box-border: #E8E8E8; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-pink); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* [분홍 박스 - 크기 절대 고정] */
        header.site-header {
            width: 100%;
            padding: 10px 20px 8px 20px; 
            background-color: var(--bg-pink);
            position: relative;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-top {
            width: 100%;
            max-width: 1400px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 45px; 
            margin-bottom: 8px;
        }

        /* ---------------------------------------------------------
           [PC 전용] 769px 이상
        ---------------------------------------------------------- */
        @media (min-width: 769px) {
            .header-left-logo { position: absolute; left: 0; top: 90%; transform: translateY(-50%); }
            .header-left-logo img { max-width: 160px; height: auto; } /* PC 로고 키움 */

            .header-title { margin-left: 180px; } /* 글씨 오른쪽 이동 */
            .header-title a {
                font-family: 'Cafe24Decoline', serif; font-size: 38px;
                color: var(--text-black); text-decoration: none; text-transform: uppercase;
            }

            .nav-container {
                width: 100%; max-width: 1400px; display: flex;
                justify-content: flex-end; padding-right: 100px; gap: 12px;
            }
            .nav-group { flex: 0 1 150px; }
            .nav-item {
                font-family: 'Cafe24Ssukssuk', sans-serif; font-size: 15px; height: 34px;
                background-color: rgba(255, 255, 255, 0.6); border: 1px solid var(--box-border);
                border-radius: 6px; display: flex; justify-content: center; align-items: center;
                color: var(--menu-gray); cursor: pointer;
            }

            .main-content {
                width: 100%; min-height: 850px;
                background-image: url('images/danag.jpg'); /* 사진 경로 확인! */
                background-size: contain; background-position: center top; background-repeat: no-repeat;
            }
        }

        /* ---------------------------------------------------------
           [모바일 전용] 768px 이하
        ---------------------------------------------------------- */
        @media (max-width: 768px) {
            .header-top { display: flex; flex-direction: row; gap: 6px; }
            .header-left-logo { position: static; transform: none; }
            .header-left-logo img { max-width: 45px; } 

            .header-title a { font-size: 14px; text-decoration: none; color: var(--text-black); }

            .nav-container { width: 100%; display: flex; flex-direction: row; gap: 4px; }
            .nav-group { flex: 1; }
            .nav-item { 
                font-family: 'Cafe24Ssukssuk', sans-serif; font-size: 13px; /* 글씨 키움 */
                height: 30px; background-color: rgba(255, 255, 255, 0.7);
                border: 1px solid var(--box-border); border-radius: 4px;
                display: flex; justify-content: center; align-items: center;
            }

            .main-content {
                width: 100%; height: auto; aspect-ratio: 3 / 4;
                background-image: url('images/danag.jpg'); /* 사진 경로 확인! */
                background-size: cover; background-position: center;
                filter: none; /* 모바일 사진 밝기 원본 유지 */
            }
        }

        /* [메인 콘텐츠 공통] */
        .main-content {
            display: flex; flex-direction: column; align-items: center;
            background-color: var(--bg-blue-point);
            font-family: 'Ownglyph_Uiyeon', sans-serif; color: white; text-align: center;
        }
        .info-wrap { margin-top: 40px; }
        .info-date { font-size: 30px; text-shadow: 2px 2px 10px rgba(0,0,0,0.6); }
        .info-time { font-size: 26px; margin: 10px 0 25px; text-shadow: 2px 2px 10px rgba(0,0,0,0.6); }
        .info-location { font-size: 28px; line-height: 1.6; text-shadow: 2px 2px 10px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-top">
            <div class="header-left-logo">
                <img src="images/또댕 로고.png" alt="또댕 로고">
            </div>
            <div class="header-title">
                <a href="/">Together, as always meant to be</a>
            </div>
        </div>
        
        <nav class="nav-container">
            <div class="nav-group"><div class="nav-item">결혼식 안내</div></div>
            <div class="nav-group"><div class="nav-item">예약 및 문의</div></div>
            <div class="nav-group"><div class="nav-item">지도</div></div>
            <div class="nav-group"><div class="nav-item">GALLERY</div></div>
        </nav>
    </header>

    <main class="main-content">
        <div class="info-wrap">
            <div class="info-date">날짜 : 2027. 10. 09. 토요일</div>
            <div class="info-time">시간 : PM 12:00</div>
            <div class="info-location">장소 : 롯데월드 민속박물관<br>전통혼례장</div>
        </div>
    </main>

</body>
</html>
