<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DDodang GNB - Mobile Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-soft-pink: #FFF0F0;
            --point-blue: #A9D1F7;
            --menu-green: #DCEDC8;
            --line-brown: #5D4037;
        }

        body {
            background-color: var(--bg-soft-pink);
            font-family: 'Gaegu', cursive;
            margin: 0; padding: 0;
            overflow-x: hidden; /* 가로 스크롤 완전 방지 */
        }

        header#header {
            width: 100%;
            display: flex;
            justify-content: center;
            background-color: var(--bg-soft-pink);
        }

        /* [핵심] 가로 정렬을 절대 포기하지 않는 컨테이너 */
        .header_inner#topSearchWrap {
            width: 100%;
            max-width: 1280px;
            display: flex;
            justify-content: space-between; /* 무조건 양 끝 배치 */
            align-items: center;
            padding: 15px 20px; /* 모바일에선 여백이 너무 크면 안 되니까 살짝 조절 */
            box-sizing: border-box;
            border-bottom: 4px solid var(--line-brown);
        }

        /* 로고 영역 */
        .search_logo#special-input-logo { margin: 0; flex-shrink: 0; }
        .search_logo a { text-decoration: none; display: block; }
        .search_logo a:after {
            content: 'DDodang';
            font-size: 40px; /* PC 기본 크기 살짝 조정 */
            font-weight: bold;
            color: var(--point-blue);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            transition: font-size 0.2s; /* 크기 변화 부드럽게 */
        }

        /* 메뉴 버튼 영역 */
        .shortcut_area { display: flex; align-items: center; flex-shrink: 0; }
        .shortcut_list {
            display: flex; 
            gap: 8px; /* 버튼 사이 간격 */
            margin: 0; padding: 0; 
            list-style: none;
        }
        
        .shortcut_item a.link_service {
            display: block;
            width: 80px; height: 40px;
            background-color: var(--menu-green);
            border: 1px solid #999;
            border-radius: 4px;
            transition: all 0.2s;
        }

        /* -------------------------------------------------- */
        /* [반응형] 사이즈만 슥슥 줄어드는 마법의 구간 */
        /* -------------------------------------------------- */
        
        /* 태블릿 이하 (830px) */
        @media (max-width: 830px) {
            .search_logo a:after {
                font-size: 32px; /* 로고 작게 */
            }
            .shortcut_item a.link_service {
                width: 60px; height: 32px; /* 버튼 작게 */
            }
            .shortcut_list { gap: 5px; }
        }

        /* 핸드폰 (480px 이하) */
        @media (max-width: 480px) {
            .header_inner#topSearchWrap {
                padding: 10px 15px; /* 여백 더 줄임 */
            }
            .search_logo a:after {
                font-size: 26px; /* 더 작게 해서 안 잘리게! */
            }
            .shortcut_item a.link_service {
                width: 45px; height: 28px; /* 아주 작은 버튼 */
            }
            .shortcut_list { gap: 4px; }
        }

        .blind { position: absolute; width: 1px; height: 1px; clip: rect(0 0 0 0); overflow: hidden; }
    </style>
</head>
<body>

<header id="header">
    <div id="topSearchWrap" class="header_inner">
        <h1 id="special-input-logo" class="search_logo">
            <a href="/" class="link_naver"><span class="blind">DDodang</span></a>
        </h1>

        <div id="shortcutArea" class="shortcut_area">
            <ul class="shortcut_list">
                <li class="shortcut_item"><a href="#" class="link_service"></a></li>
                <li class="shortcut_item"><a href="#" class="link_service"></a></li>
                <li class="shortcut_item"><a href="#" class="link_service"></a></li>
            </ul>
        </div>
    </div>
</header>

</body>
</html>
