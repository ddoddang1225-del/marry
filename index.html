<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DDodang - Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* [1. 클릭엔에서 추출한 핵심 디자인 시스템] */
        :root {
            --bg-color: #FFF0F0;      /* 사이트 전체 배경 (연분홍) */
            --logo-color: #A9D1F7;    /* DDodang 로고 (하늘색) */
            --btn-color: #DCEDC8;     /* 메뉴 버튼 (연두색) */
            --line-accent: #5D4037;   /* 핵심 구분선 (진한 갈색) */
            --text-main: #333333;     /* 기본 텍스트 */
            --header-h: 120px;        /* 헤더 높이 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            font-family: 'Gaegu', cursive;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* [2. 상단 헤더 (GNB) 프론트엔드] */
        .clickn-header {
            width: 100%;
            height: var(--header-h);
            background-color: var(--bg-color);
            border-bottom: 4px solid var(--line-accent); /* 클릭엔의 그 두꺼운 선 */
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
        }

        .header-inner {
            width: 100%;
            max-width: 1280px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }

        /* 로고: DDodang (48px) */
        .logo a {
            font-size: 48px;
            font-weight: bold;
            color: var(--logo-color);
            text-decoration: none;
            letter-spacing: -1px;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.05);
        }

        /* 메뉴 영역 */
        .nav-group {
            display: flex;
            gap: 12px;
        }

        .nav-item {
            width: 90px;
            height: 45px;
            background-color: var(--btn-color);
            border: 1.2px solid #666;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .nav-item:hover {
            transform: scale(1.05);
            filter: brightness(0.95);
        }

        /* [3. 메인 바디 영역] */
        .content-wrap {
            margin-top: var(--header-h);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* 클릭엔 스타일의 이미지 프레임 */
        .main-visual {
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .main-visual img {
            width: 100%;
            display: block;
        }

        /* 텍스트 정보 */
        .wedding-info {
            text-align: center;
        }

        .wedding-info h2 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            color: #444;
        }

        .wedding-info p {
            font-size: 1.6rem;
            color: #666;
        }

        /* [4. 모바일 반응형 프론트엔드 - 사이즈 자동 조절] */
        @media (max-width: 830px) {
            :root { --header-h: 90px; }
            .header-inner { padding: 0 20px; }
            .logo a { font-size: 34px; }
            .nav-item { width: 65px; height: 35px; }
            .nav-group { gap: 8px; }
        }

        @media (max-width: 480px) {
            :root { --header-h: 75px; }
            .logo a { font-size: 28px; }
            .nav-item { width: 50px; height: 30px; }
            .nav-group { gap: 6px; }
        }
    </style>
</head>
<body>

    <header class="clickn-header">
        <div class="header-inner">
            <div class="logo">
                <a href="/">DDodang</a>
            </div>
            <nav class="nav-group">
                <div class="nav-item"></div>
                <div class="nav-item"></div>
                <div class="nav-item"></div>
            </nav>
        </div>
    </header>

    <main class="content-wrap">
        <div class="main-visual">
            <img src="https://via.placeholder.com/800x1000/FFE0E0/555555?text=Our+Wedding+Photo" alt="Main Visual">
        </div>
        <div class="wedding-info">
            <h2>또당 & 진현</h2>
            <p>2027. 10. 09. SAT PM 12:00</p>
            <p>롯데월드 민속박물관</p>
        </div>
    </main>

</body>
</html>
