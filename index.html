<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDodang - Header</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* [1. 클릭엔 추출 컬러 시스템] */
        :root {
            --bg-pink: #FFF0F0;      /* 사진 속 연분홍 배경 */
            --logo-black: #222222;   /* 사진 속 ISABELLA 로고색 */
            --menu-text: #333333;    /* 메뉴 글자색 */
            --max-w: 1200px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-pink);
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* [2. 헤더 컨테이너: 사진처럼 중앙 정렬 구조] */
        header.site-header {
            width: 100%;
            padding: 60px 20px 30px 20px; /* 사진 속 위아래 여백 재현 */
            background-color: var(--bg-pink);
            display: flex;
            flex-direction: column; /* 세로로 쌓기 (로고 위, 메뉴 아래) */
            align-items: center;
            text-align: center;
        }

        /* [3. 로고 영역: ISABELLA -> DDODANG] */
        .logo-area {
            margin-bottom: 40px; /* 로고와 메뉴 사이 간격 */
        }

        .logo-area a {
            font-family: 'Oswald', sans-serif; /* 사진 속 폰트와 가장 흡사한 느낌 */
            font-size: 70px; /* 사진 속 큰 로고 크기 */
            font-weight: 600;
            color: var(--logo-black);
            text-decoration: none;
            letter-spacing: 8px; /* 사진처럼 글자 사이 간격 넓게 */
            text-transform: uppercase; /* 무조건 대문자로 */
        }

        /* [4. 메뉴 영역: 하단 나열] */
        .nav-menu {
            width: 100%;
            max-width: var(--max-w);
            display: flex;
            justify-content: center; /* 메뉴 중앙 정렬 */
            gap: 50px; /* 메뉴 사이 넉넉한 간격 */
        }

        .nav-item {
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            color: var(--menu-text);
            letter-spacing: -0.5px;
            transition: color 0.2s;
        }

        .nav-item:hover {
            color: #888; /* 호버 시 살짝 연해짐 */
        }

        /* [5. 모바일 반응형: 화면 작아지면 글자도 작아지게] */
        @media (max-width: 768px) {
            header.site-header { padding: 40px 15px 20px 15px; }
            
            .logo-area a {
                font-size: 45px; /* 모바일용 로고 크기 */
                letter-spacing: 4px;
            }

            .nav-menu {
                gap: 20px; /* 메뉴 간격 좁히기 */
                flex-wrap: wrap; /* 모바일에서 메뉴가 많으면 다음 줄로 */
            }

            .nav-item {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="logo-area">
            <a href="/">DDODANG</a>
        </div>

        <nav class="nav-menu">
            <a href="#" class="nav-item">결혼식 안내</a>
            <a href="#" class="nav-item">예약 및 문의</a>
            <a href="#" class="nav-item">기타</a>
            <a href="#" class="nav-item">GALLERY</a>
        </nav>
    </header>

</body>
</html>
